name: Release

# Five trigger paths:
#   1. push of a v*.*.* tag                 → full release (build + publish to GitHub Releases)
#   2. push to a release/** branch          → dry-run build only (artifacts uploaded, no Release)
#   3. manual workflow_dispatch (draft=off) → dry-run build only (run from any branch via the
#                                             Actions tab → Release → Run workflow)
#   4. manual workflow_dispatch (draft=on)  → DRAFT GitHub Release (maintainers only). Same
#                                             VersionPrefix as the eventual public release —
#                                             no -dryrun.<sha> suffix on artifact names — so
#                                             the bits you smoke-test are byte-for-byte what
#                                             would ship if you flip the draft to "Published".
#   5. workflow_call (mode=nightly)         → nightly build invoked by .github/workflows/nightly.yml.
#                                             Builds develop tip (caller passes ref=develop), versions
#                                             artifacts as <prefix>-nightly.YYYYMMDD.<shortsha>, and
#                                             publishes a rolling prerelease at tag `nightly`.
#
# In all five modes the same matrix builds one installer per platform.
# The shipped installer wraps a single `OpenhpsdrZeus` binary that serves
# both modes: launched with no args it runs as the LAN-bound HTTP service;
# launched with `--desktop` it runs as a Photino native shell. 'create-release'
# is gated on is-release='true' (modes 1 and 4); 'create-nightly-release' is
# gated on is-nightly='true' (mode 5 only).
on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - 'release/**'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Publish as a DRAFT GitHub Release (visible only to maintainers, version not suffixed with -dryrun.<sha>). Leave unchecked for a regular dry-run that only uploads artifacts to the run page.'
        type: boolean
        required: false
        default: false
  workflow_call:
    inputs:
      mode:
        description: 'Build mode when invoked as a reusable workflow. Currently only `nightly` is consumed by the parse step; other values fall through to the dry-run path.'
        type: string
        required: false
        default: dryrun
      ref:
        description: 'Git ref to check out in every job. Empty string keeps existing behaviour (use the triggering SHA). Nightly callers pass `develop` so the schedule-trigger (which fires on the default branch, main) still builds develop tip.'
        type: string
        required: false
        default: ''

jobs:
  determine-version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      # Full SemVer string used in artifact filenames (e.g. 0.4.1-dryrun.abc1234).
      version: ${{ steps.parse.outputs.version }}
      # Numeric MAJOR.MINOR.PATCH for -p:VersionPrefix. .NET's AssemblyVersion /
      # FileVersion are derived from this in Directory.Build.props and reject
      # any non-numeric content (CS7034 / CS7035), so the suffix has to ride on
      # VersionSuffix instead.
      version-prefix: ${{ steps.parse.outputs.version-prefix }}
      version-suffix: ${{ steps.parse.outputs.version-suffix }}
      is-release: ${{ steps.parse.outputs.is-release }}
      is-draft: ${{ steps.parse.outputs.is-draft }}
      is-nightly: ${{ steps.parse.outputs.is-nightly }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Parse version + validate (tag mode only)
        id: parse
        env:
          # workflow_dispatch boolean inputs arrive as the strings "true"/"false";
          # plumb through env so the bash conditional below stays readable.
          DISPATCH_DRAFT: ${{ github.event.inputs.draft }}
          # workflow_call input — empty unless invoked by nightly.yml (or any
          # other reusable caller). Drives the IS_NIGHTLY branch below.
          INPUT_MODE: ${{ inputs.mode }}
        run: |
          IS_DRAFT="false"
          IS_NIGHTLY="false"
          if [[ "$INPUT_MODE" == "nightly" ]]; then
            # Nightly mode — caller (nightly.yml) has already pointed checkout
            # at develop via `inputs.ref`, so HEAD reflects develop tip rather
            # than the schedule-trigger ref (main). Read SHA from git, not from
            # $GITHUB_SHA, for the same reason.
            VERSION_PREFIX=$(sed -n 's:.*<VersionPrefix[^>]*>\([^<]*\)</VersionPrefix>.*:\1:p' Directory.Build.props | head -1)
            VERSION_PREFIX="${VERSION_PREFIX:-0.0.0}"
            DATE_STAMP=$(date -u +%Y%m%d)
            SHORT_SHA=$(git rev-parse --short=7 HEAD)
            VERSION_SUFFIX="nightly.${DATE_STAMP}.${SHORT_SHA}"
            VERSION="${VERSION_PREFIX}-${VERSION_SUFFIX}"
            IS_RELEASE="false"
            IS_NIGHTLY="true"
            echo "Nightly build (ref=$GITHUB_REF, head=$SHORT_SHA) → version $VERSION"
          elif [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            # Tag push — strict release path.
            if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Tag '$GITHUB_REF_NAME' does not match vMAJOR.MINOR.PATCH (e.g. v1.2.3)."
              exit 1
            fi
            git fetch origin main --depth=0 2>/dev/null || git fetch origin main
            TAG_SHA=$(git rev-parse "$GITHUB_REF_NAME^{commit}")
            if ! git merge-base --is-ancestor "$TAG_SHA" origin/main; then
              echo "::error::Tag '$GITHUB_REF_NAME' (commit $TAG_SHA) is not reachable from origin/main. Releases must be tagged from main."
              exit 1
            fi
            VERSION_PREFIX="${GITHUB_REF_NAME#v}"
            VERSION_SUFFIX=""
            VERSION="$VERSION_PREFIX"
            IS_RELEASE="true"
            echo "Tagged release $GITHUB_REF_NAME → version $VERSION"
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "$DISPATCH_DRAFT" == "true" ]]; then
            # Manual dispatch with draft=true — produce a DRAFT GitHub Release
            # using the in-tree VersionPrefix verbatim. No -dryrun.<sha> suffix:
            # the artifact filenames you smoke-test must match the eventual
            # published release byte-for-byte. The draft is only visible to
            # maintainers until someone clicks "Publish release".
            VERSION_PREFIX=$(sed -n 's:.*<VersionPrefix[^>]*>\([^<]*\)</VersionPrefix>.*:\1:p' Directory.Build.props | head -1)
            VERSION_PREFIX="${VERSION_PREFIX:-0.0.0}"
            VERSION_SUFFIX=""
            VERSION="$VERSION_PREFIX"
            IS_RELEASE="true"
            IS_DRAFT="true"
            echo "Draft release dispatch (ref=$GITHUB_REF) → version $VERSION (draft=true)"
          else
            # Branch push or manual dispatch (draft=false) — dry-run path. Read
            # VersionPrefix from Directory.Build.props and ride the dryrun.<sha>
            # tag on VersionSuffix so .NET's AssemblyVersion (which is built
            # from VersionPrefix only) stays a valid MAJOR.MINOR.PATCH.
            VERSION_PREFIX=$(sed -n 's:.*<VersionPrefix[^>]*>\([^<]*\)</VersionPrefix>.*:\1:p' Directory.Build.props | head -1)
            VERSION_PREFIX="${VERSION_PREFIX:-0.0.0}"
            SHORT_SHA="${GITHUB_SHA:0:7}"
            VERSION_SUFFIX="dryrun.${SHORT_SHA}"
            VERSION="${VERSION_PREFIX}-${VERSION_SUFFIX}"
            IS_RELEASE="false"
            echo "Dry-run build (trigger=$GITHUB_EVENT_NAME ref=$GITHUB_REF) → version $VERSION"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version-prefix=${VERSION_PREFIX}" >> "$GITHUB_OUTPUT"
          echo "version-suffix=${VERSION_SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "is-release=${IS_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "is-draft=${IS_DRAFT}" >> "$GITHUB_OUTPUT"
          echo "is-nightly=${IS_NIGHTLY}" >> "$GITHUB_OUTPUT"

  # ---------- Native WDSP rebuild (always-fresh natives in releases) -------
  #
  # Releases used to ship whatever native binaries were committed at the tag
  # SHA — leaving a stale-natives race if a native/** source change reached
  # main without a matching binary commit. These jobs rebuild WDSP for every
  # shipped platform during the release run and hand the fresh binaries to
  # build-release via artifacts. The committed Zeus.Dsp/runtimes/ blobs are
  # ignored for releases (they remain useful only for local `dotnet run`).
  #
  # Build steps mirror build-native-libs.yml — see the comment-blocks there
  # for the per-arch CRT linkage / vcpkg triplet / WDSP_WITH_NR4 reasoning.

  build-native-windows:
    name: Build native WDSP (windows-${{ matrix.arch }})
    needs: determine-version
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install FFTW via vcpkg
        run: |
          $triplet = if ("${{ matrix.arch }}" -eq "arm64") {
            "arm64-windows-static"
          } else {
            "x64-windows-static-md"
          }
          vcpkg install fftw3:$triplet
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Configure CMake
        run: |
          $archFlag = if ("${{ matrix.arch }}" -eq "arm64") { "ARM64" } else { "x64" }
          $triplet = if ("${{ matrix.arch }}" -eq "arm64") {
            "arm64-windows-static"
          } else {
            "x64-windows-static-md"
          }
          $cmakeArgs = @(
            '-S', 'native/wdsp',
            '-B', 'native/build',
            '-G', 'Visual Studio 17 2022',
            '-A', $archFlag,
            '-T', 'ClangCL',
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake",
            "-DVCPKG_TARGET_TRIPLET=$triplet",
            '-DWDSP_WITH_NR3=OFF',
            '-DWDSP_WITH_NR4=ON'
          )
          if ("${{ matrix.arch }}" -eq "arm64") {
            $cmakeArgs += '-DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded'
          }
          Write-Host "cmake args:"; $cmakeArgs | ForEach-Object { Write-Host "  $_" }
          & cmake @cmakeArgs

      - name: Build
        run: cmake --build native/build --config Release --parallel

      - name: Verify SBNR exports
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstall = & $vswhere -latest -property installationPath
          $dumpbin = Get-ChildItem -Path "$vsInstall\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe" |
                     Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
          if (-not $dumpbin) { throw "dumpbin.exe not found under $vsInstall\VC\Tools\MSVC" }
          $exports = & $dumpbin /EXPORTS native/build/Release/wdsp.dll | Select-String "SetRXASBNR"
          $count = ($exports | Measure-Object).Count
          Write-Host "Found $count SetRXASBNR* exports"
          if ($count -ne 8) { throw "Expected 8 SetRXASBNR* exports, got $count. NR4 did not link correctly." }

      - name: Stage DLL
        run: |
          $rid = "win-${{ matrix.arch }}"
          $destDir = "staged/$rid"
          New-Item -ItemType Directory -Force -Path $destDir
          Copy-Item "native/build/Release/wdsp.dll" "$destDir/wdsp.dll"

      # ---------- miniaudio (desktop-mode RX sink + TX mic capture) -------
      #
      # Pure C, no third-party deps — WASAPI is loaded dynamically at
      # runtime, so no link libs and no vcpkg packages are required. Same
      # VS 2022 generator + arch flag as wdsp above. We do NOT pass
      # `-T ClangCL` here: that toolset was needed only because libspecbleach
      # (NR4) uses a C99 VLA that MSVC rejects; miniaudio is plain MSVC-clean.
      - name: Configure miniaudio (CMake)
        run: |
          $archFlag = if ("${{ matrix.arch }}" -eq "arm64") { "ARM64" } else { "x64" }
          cmake -S native/miniaudio -B native/build-miniaudio `
            -G "Visual Studio 17 2022" `
            -A $archFlag

      - name: Build miniaudio
        run: cmake --build native/build-miniaudio --config Release --parallel

      - name: Stage miniaudio DLL
        run: |
          $rid = "win-${{ matrix.arch }}"
          Copy-Item "native/build-miniaudio/Release/miniaudio.dll" "staged/$rid/miniaudio.dll"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          # Artifact name kept as `wdsp-native-*` for compatibility with the
          # build-release `Map RID to native artifact name` step; the staged
          # dir now contains both wdsp.dll and miniaudio.dll, and the
          # downstream `download-artifact` extracts the whole directory into
          # Zeus.Dsp/runtimes/<rid>/native/.
          name: wdsp-native-win-${{ matrix.arch }}
          path: staged/win-${{ matrix.arch }}/

  build-native-linux:
    name: Build native WDSP (linux-x64)
    needs: determine-version
    # Pinned to ubuntu-22.04 (glibc 2.35) to match release.yml's linux build
    # host — see the comment in build-release matrix's linux entry.
    # linux-arm64 is intentionally not built here: no release artifact ships
    # for that RID. Use build-native-libs.yml (workflow_dispatch) to refresh
    # the committed linux-arm64 binary for local dev when needed.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfftw3-dev cmake build-essential pkg-config

      - name: Configure CMake
        run: |
          cmake -S native/wdsp -B native/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DWDSP_WITH_NR3=OFF \
            -DWDSP_WITH_NR4=ON

      - name: Build
        run: cmake --build native/build --config Release --parallel

      - name: Verify SBNR exports
        run: |
          count=$(nm -D native/build/libwdsp.so | grep -c "SetRXASBNR" || true)
          echo "Found $count SetRXASBNR* exports"
          if [ "$count" -ne 8 ]; then
            echo "ERROR: Expected 8 SetRXASBNR* exports, got $count. NR4 did not link correctly."
            exit 1
          fi

      - name: Stage library + bundled FFTW
        run: |
          set -eux
          destDir="staged/linux-x64"
          mkdir -p "$destDir"
          cp native/build/libwdsp.so "$destDir/libwdsp.so"
          for soname in libfftw3.so.3 libfftw3f.so.3; do
            src=$(readlink -f "/usr/lib/x86_64-linux-gnu/$soname")
            cp "$src" "$destDir/$soname"
          done
          ls -la "$destDir/"
          ldd "$destDir/libwdsp.so"

      # ---------- miniaudio (desktop-mode RX sink + TX mic capture) -------
      #
      # Pure C, no third-party deps — ALSA / PulseAudio / JACK are loaded
      # dynamically at runtime via dlopen. Only -ldl + -lpthread + -lm are
      # required at link time and all three live in libc / libpthread, which
      # are already present in the build-essential toolchain installed
      # above. No additional apt packages needed.
      - name: Build & stage miniaudio
        run: |
          set -eux
          cmake -S native/miniaudio -B native/build-miniaudio -DCMAKE_BUILD_TYPE=Release
          cmake --build native/build-miniaudio --config Release --parallel
          cp native/build-miniaudio/libminiaudio.so staged/linux-x64/libminiaudio.so
          ldd staged/linux-x64/libminiaudio.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          # Staged dir now contains libwdsp.so + libfftw3.so.3 +
          # libfftw3f.so.3 + libminiaudio.so. The downstream
          # `download-artifact` extracts the whole directory into
          # Zeus.Dsp/runtimes/linux-x64/native/.
          name: wdsp-native-linux-x64
          path: staged/linux-x64/

  build-native-macos:
    name: Build native WDSP (osx-arm64)
    needs: determine-version
    runs-on: macos-latest  # Apple Silicon — matches release.yml macos-arm64 host
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install build dependencies
        run: |
          # fftw bottle ships both fftw3 (double, for WDSP) and fftw3f (single,
          # for libspecbleach / NR4). cmake is preinstalled on macos-latest but
          # `brew install cmake` is a no-op safety net.
          brew install fftw cmake

      - name: Configure CMake
        run: |
          cmake -S native/wdsp -B native/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DWDSP_WITH_NR3=OFF \
            -DWDSP_WITH_NR4=ON

      - name: Build
        run: cmake --build native/build --config Release --parallel

      - name: Verify SBNR exports
        run: |
          # macOS nm prefixes C symbols with an underscore — match _SetRXASBNR.
          count=$(nm -gU native/build/libwdsp.dylib | grep -c "_SetRXASBNR" || true)
          echo "Found $count _SetRXASBNR* exports"
          if [ "$count" -ne 8 ]; then
            echo "ERROR: Expected 8 _SetRXASBNR* exports, got $count. NR4 did not link correctly."
            exit 1
          fi

      - name: Stage dylib + bundled FFTW
        run: |
          set -eux
          destDir="staged/osx-arm64"
          mkdir -p "$destDir"
          cp native/build/libwdsp.dylib "$destDir/libwdsp.dylib"

          # Bundle both FFTW precisions alongside libwdsp so the .app is
          # self-contained on any Mac without Homebrew FFTW installed —
          # mirrors what the Linux job already does for libfftw3.so.3.
          fftw_lib="$(brew --prefix fftw)/lib"
          cp "${fftw_lib}/libfftw3.3.dylib"  "$destDir/libfftw3.3.dylib"
          cp "${fftw_lib}/libfftw3f.3.dylib" "$destDir/libfftw3f.3.dylib"

          # Rewrite the absolute Homebrew LC_LOAD_DYLIB paths baked into
          # libwdsp.dylib by the CI runner to @loader_path so the dylib
          # resolves its FFTW deps relative to its own location, independent
          # of DYLD_LIBRARY_PATH. Belt-and-suspenders alongside launch.sh's
          # DYLD_LIBRARY_PATH export.
          install_name_tool \
            -change "${fftw_lib}/libfftw3.3.dylib"  @loader_path/libfftw3.3.dylib \
            -change "${fftw_lib}/libfftw3f.3.dylib" @loader_path/libfftw3f.3.dylib \
            "$destDir/libwdsp.dylib"

          # Fail the build if any Homebrew absolute path survives — a leftover
          # would ship a bundle broken on Macs without Homebrew FFTW installed.
          if otool -L "$destDir/libwdsp.dylib" | grep -q '/opt/homebrew'; then
            echo "ERROR: Homebrew absolute paths still present after install_name_tool rewrite"
            otool -L "$destDir/libwdsp.dylib"
            exit 1
          fi
          otool -L "$destDir/libwdsp.dylib"
          ls -la "$destDir/"

      # ---------- miniaudio (desktop-mode RX sink + TX mic capture) -------
      #
      # Pure C, CoreAudio backend. cmake is already installed by the wdsp
      # step above. macOS frameworks (CoreAudio / AudioToolbox / AudioUnit /
      # CoreFoundation) come from the SDK that ships with Xcode CLT on
      # macos-latest — no extra brew packages needed.
      - name: Build & stage miniaudio
        run: |
          set -eux
          cmake -S native/miniaudio -B native/build-miniaudio -DCMAKE_BUILD_TYPE=Release
          cmake --build native/build-miniaudio --config Release --parallel
          cp native/build-miniaudio/libminiaudio.dylib staged/osx-arm64/libminiaudio.dylib
          otool -L staged/osx-arm64/libminiaudio.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          # Staged dir now contains libwdsp.dylib + libfftw3.3.dylib +
          # libfftw3f.3.dylib + libminiaudio.dylib. The downstream
          # `download-artifact` extracts the whole directory into
          # Zeus.Dsp/runtimes/osx-arm64/native/.
          name: wdsp-native-osx-arm64
          path: staged/osx-arm64/

  build-release:
    name: Build (${{ matrix.config.os }})
    needs:
      - determine-version
      - build-native-windows
      - build-native-linux
      - build-native-macos
    runs-on: ${{ matrix.config.runner }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: windows
            runner: windows-latest
            rid: win-x64
            arch: x64
            artifact: windows-installer
          # Windows-on-ARM. Cross-published from the x64 windows-latest host —
          # .NET 10 emits win-arm64 binaries from any host arch, and Inno Setup
          # iscc on x64 produces an installer that targets ARM64 fine. Keeping
          # the runner pinned to windows-latest (rather than windows-11-arm)
          # avoids native-tooling drift between the two arches.
          - os: windows
            runner: windows-latest
            rid: win-arm64
            arch: arm64
            artifact: windows-arm64-installer
          - os: linux
            # Pinned to ubuntu-22.04 (glibc 2.35) — the self-contained .NET
            # publish embeds native runtime libs that link against the build
            # host's glibc, so building on ubuntu-latest (24.04, glibc 2.39)
            # produces a tarball that fails on Ubuntu 22.04 / Debian 12 / RHEL
            # 9 with `version GLIBC_2.38 not found`. Match build-native-libs.yml.
            runner: ubuntu-22.04
            rid: linux-x64
            artifact: linux-tarball
            appimage_artifact: linux-appimage
          - os: macos-arm64
            runner: macos-latest  # Apple Silicon
            rid: osx-arm64
            artifact: macos-arm64-dmg

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Determine version
        id: version
        shell: bash
        run: |
          VERSION="${{ needs.determine-version.outputs.version }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      # Map release matrix RID → native artifact built by the build-native-*
      # jobs above. Keep this in sync if either set changes.
      - name: Map RID to native artifact name
        id: native-artifact
        shell: bash
        run: |
          case "${{ matrix.config.rid }}" in
            win-x64)    echo "name=wdsp-native-win-x64"    >> "$GITHUB_OUTPUT" ;;
            win-arm64)  echo "name=wdsp-native-win-arm64"  >> "$GITHUB_OUTPUT" ;;
            linux-x64)  echo "name=wdsp-native-linux-x64"  >> "$GITHUB_OUTPUT" ;;
            osx-arm64)  echo "name=wdsp-native-osx-arm64"  >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::No native artifact mapped for RID ${{ matrix.config.rid }}"; exit 1 ;;
          esac

      # Download natives built fresh in this same workflow run and stage them
      # into Zeus.Dsp/runtimes/<rid>/native/, overwriting whatever was
      # committed at the tag SHA. This is what makes releases immune to
      # stale-committed-natives drift — the binaries that ship are always
      # built from the exact source the tag points at.
      - name: Download fresh native WDSP for ${{ matrix.config.rid }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.native-artifact.outputs.name }}
          path: Zeus.Dsp/runtimes/${{ matrix.config.rid }}/native/

      - name: Verify staged natives
        shell: bash
        run: |
          echo "Native files now staged for ${{ matrix.config.rid }}:"
          ls -la "Zeus.Dsp/runtimes/${{ matrix.config.rid }}/native/"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: zeus-web/package-lock.json

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: zeus-web

      - name: Publish OpenhpsdrZeus
        # Single self-contained publish per RID. The resulting binary
        # (`OpenhpsdrZeus`) serves both launch modes: no args = LAN HTTP
        # service, `--desktop` = Photino native shell. Per-installer scripts
        # (Windows .iss, Linux tarball/AppImage, macOS .app) consume this
        # output dir directly. Force bash so the backslash line-continuations
        # parse on windows-latest (where the default shell is PowerShell).
        # VersionPrefix stays numeric (consumed by AssemblyVersion); the
        # text suffix rides on VersionSuffix and lands in InformationalVersion.
        shell: bash
        run: |
          dotnet publish OpenhpsdrZeus/OpenhpsdrZeus.csproj \
            -c Release \
            -r ${{ matrix.config.rid }} \
            --self-contained true \
            -p:PublishReadyToRun=true \
            -p:VersionPrefix=${{ needs.determine-version.outputs.version-prefix }} \
            -p:VersionSuffix=${{ needs.determine-version.outputs.version-suffix }} \
            -p:DebugType=embedded \
            -p:DebugSymbols=false

      # ---------- Installer packaging (one per OS, two launch modes) ------

      # Download the Microsoft Visual C++ 2015-2022 Redistributable matching
      # this installer's architecture. zeus-windows.iss bundles this file via
      # the [Files] section and runs it at install time, guarded by a
      # VCRedistNeeded() registry check so it skips on machines that already
      # have a compatible runtime. Without this, every fresh-Windows operator
      # who downloads Zeus gets a silently broken install — see issue #452.
      # aka.ms URLs are Microsoft's stable redirects; the resolved binary
      # tracks the latest 14.x service pack on each fetch (binary-compatible).
      - name: Download Visual C++ Redistributable
        if: matrix.config.os == 'windows'
        shell: pwsh
        run: |
          $url = "https://aka.ms/vs/17/release/vc_redist.${{ matrix.config.arch }}.exe"
          $out = "installers\vc_redist.${{ matrix.config.arch }}.exe"
          Write-Host "Downloading $url -> $out"
          Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
          Get-Item $out | Select-Object Name, Length

      - name: Build Windows Installer (Inno Setup)
        if: matrix.config.os == 'windows'
        shell: pwsh
        run: |
          choco install innosetup -y
          $env:PATH += ";C:\Program Files (x86)\Inno Setup 6"
          iscc /DMyAppVersion="${{ steps.version.outputs.version }}" /DArch="${{ matrix.config.arch }}" installers\zeus-windows.iss

      - name: Upload Windows Installer
        if: matrix.config.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.artifact }}
          path: installers/output/openhpsdr-zeus-${{ steps.version.outputs.version }}-win-${{ matrix.config.arch }}-setup.exe
          if-no-files-found: error

      - name: Build Linux Package
        if: matrix.config.os == 'linux'
        run: |
          chmod +x installers/create-linux-package.sh
          installers/create-linux-package.sh ${{ steps.version.outputs.version }}

      - name: Upload Linux Package
        if: matrix.config.os == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.artifact }}
          path: installers/output/openhpsdr-zeus-${{ steps.version.outputs.version }}-linux-x64.tar.gz
          if-no-files-found: error

      - name: Build Linux Desktop AppImage
        if: matrix.config.os == 'linux'
        run: |
          # appimagetool fetched on-demand by the script. We pass
          # --appimage-extract-and-run inside the script so FUSE2 isn't
          # required on the runner. The AppImage is the desktop-mode
          # single-file launcher; the tarball ships separately for the
          # service-mode / LAN-browser use case.
          chmod +x installers/create-linux-desktop-appimage.sh
          installers/create-linux-desktop-appimage.sh ${{ steps.version.outputs.version }}

      - name: Upload Linux Desktop + Server AppImages
        if: matrix.config.os == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.appimage_artifact }}
          # Both AppImages — the desktop one (--desktop default) and the
          # server one (--server, Photino status window). The glob picks
          # up both since they share the OpenhpsdrZeus prefix.
          path: installers/output/OpenhpsdrZeus*-${{ steps.version.outputs.version }}-linux-x86_64.AppImage
          if-no-files-found: error

      # ---------- macOS code-signing + notarization ------------------------
      #
      # Five steps gated on (is-release || is-nightly): import the Developer
      # ID cert into an ephemeral keychain, run the existing builder with
      # CODESIGN_IDENTITY exported (the script signs apps + DMG inside-out
      # hardened-runtime, see installers/create-macos-app.sh), submit to
      # Apple notary, staple the ticket into the DMG, and verify Gatekeeper
      # acceptance. The dry-run path falls through to the original
      # unsigned-build step further down.
      #
      # Why gated:
      #   - Notarization burns 2-15 min of macos-latest runner time (10x
      #     Linux cost) and counts against Apple's API submission quota.
      #     dry-run builds don't need either.
      #   - Apple's API key (.p8) only exists as a secret in the repo; PRs
      #     from forks running release.yml as a dry-run would otherwise hit
      #     a "secret missing" error mid-job.
      #
      # The ephemeral keychain name embeds run_id + run_attempt so two
      # concurrent dispatches (e.g. nightly cron racing with a maintainer's
      # manual run) never collide on /Users/runner/Library/Keychains.
      - name: macOS — dry-run notice (signing/notarization skipped)
        if: ${{ startsWith(matrix.config.os, 'macos') && needs.determine-version.outputs.is-release != 'true' && needs.determine-version.outputs.is-nightly != 'true' }}
        run: |
          echo "::notice::macOS DMG will NOT be signed or notarized in dry-run mode. The artifact will require xattr -cr on first launch."

      - name: macOS — import Developer ID certificate
        if: ${{ startsWith(matrix.config.os, 'macos') && (needs.determine-version.outputs.is-release == 'true' || needs.determine-version.outputs.is-nightly == 'true') }}
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build-${{ github.run_id }}-${{ github.run_attempt }}.keychain-db"
          CERT_PATH="$RUNNER_TEMP/macos-cert.p12"
          INTERMEDIATE_PATH="$RUNNER_TEMP/DeveloperIDG2CA.cer"

          # Decode the base64-encoded .p12 to a temp file. `security import`
          # cannot read from stdin so we have to materialize it; we shred it
          # below once it's in the keychain.
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          # Download Apple's Developer ID Certification Authority (G2)
          # intermediate cert. A .p12 exported from Keychain Access ships
          # only the leaf + private key, NOT the intermediate. On a dev
          # Mac the intermediate is already in login.keychain from prior
          # Xcode use, so the chain validates fine — but a fresh GitHub
          # Actions runner only has Apple Root CA in its trust store, so
          # codesign warns "unable to build chain to self-signed root"
          # and notarytool rejects the resulting bundle. URL is Apple's
          # stable publication endpoint; cert is valid through 2031.
          curl -fsSL --retry 3 \
              https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer \
              -o "$INTERMEDIATE_PATH"

          # Per-run ephemeral keychain so concurrent dispatches don't trample
          # each other and so cleanup is just `security delete-keychain`.
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # 6h timeout — comfortably longer than any release build wall clock.
          # Default is 5 minutes auto-lock which would break a slow notarization.
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the intermediate FIRST so chain validation works the
          # moment the leaf .p12 lands in the keychain.
          security import "$INTERMEDIATE_PATH" \
              -k "$KEYCHAIN_PATH" \
              -T /usr/bin/codesign

          # -A allows all apps to use the key without prompting (no GUI on CI).
          # -T whitelists specific tools so set-key-partition-list below can
          # set a durable ACL — without it codesign would still prompt for
          # the keychain password on first private-key access.
          security import "$CERT_PATH" \
              -P "$MACOS_CERTIFICATE_PWD" \
              -A -t cert -f pkcs12 \
              -k "$KEYCHAIN_PATH" \
              -T /usr/bin/codesign \
              -T /usr/bin/security

          # Make the codesign ACL durable. Without this codesign hangs on
          # CI waiting for a human to acknowledge the keychain prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
              -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          # Prepend the temp keychain to the user search list. codesign
          # defaults to login.keychain otherwise and never finds our cert.
          # Capture the existing list into a bash array — string-mangling
          # via tr corrupts paths in edge cases (we saw a local-test run
          # end up with the search list set to a single mangled entry
          # containing literal "-d -db" fragments).
          ORIGINAL_KEYCHAINS=()
          while IFS= read -r line; do
              clean=$(echo "$line" | sed -E 's/^[[:space:]]*"?([^"]*)"?[[:space:]]*$/\1/')
              [ -n "$clean" ] && ORIGINAL_KEYCHAINS+=("$clean")
          done < <(security list-keychains -d user)
          security list-keychains -d user -s "$KEYCHAIN_PATH" "${ORIGINAL_KEYCHAINS[@]}"

          # Shred the on-disk cert files — both are safely in the keychain
          # now. macOS `rm -P` overwrites with 0xff/0x00/0xff before unlink.
          # The intermediate is public so shredding it is paranoia, but
          # cheap and keeps the cleanup symmetric.
          rm -P "$CERT_PATH" 2>/dev/null || rm -f "$CERT_PATH"
          rm -P "$INTERMEDIATE_PATH" 2>/dev/null || rm -f "$INTERMEDIATE_PATH"

          # Propagate KEYCHAIN_PATH to subsequent steps. create-macos-app.sh
          # picks this up as the --keychain arg for every codesign call.
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          # Sanity check: the identity must be findable, otherwise the build
          # step will fail mid-way through codesign with a less helpful error.
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build macOS Package
        if: startsWith(matrix.config.os, 'macos')
        env:
          # Ternary: signed only when is-release || is-nightly. In dry-run
          # the value is the empty string regardless of whether
          # MACOS_SIGNING_IDENTITY is configured — keeps an accidentally-set
          # secret from sneaking signing into a dry-run build.
          CODESIGN_IDENTITY: ${{ (needs.determine-version.outputs.is-release == 'true' || needs.determine-version.outputs.is-nightly == 'true') && secrets.MACOS_SIGNING_IDENTITY || '' }}
          ENTITLEMENTS_PATH: ${{ github.workspace }}/installers/zeus-macos.entitlements
          # KEYCHAIN_PATH flows in via $GITHUB_ENV from the import step above.
        run: |
          set -e
          chmod +x installers/create-macos-app.sh
          ARCH="${{ matrix.config.rid == 'osx-arm64' && 'arm64' || 'x64' }}"
          installers/create-macos-app.sh ${{ steps.version.outputs.version }} $ARCH

      - name: macOS — notarize DMG
        if: ${{ startsWith(matrix.config.os, 'macos') && (needs.determine-version.outputs.is-release == 'true' || needs.determine-version.outputs.is-nightly == 'true') }}
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_KEY_P8: ${{ secrets.APPSTORE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          ARCH="${{ matrix.config.rid == 'osx-arm64' && 'arm64' || 'x64' }}"
          DMG_PATH="installers/output/OpenhpsdrZeus-${{ steps.version.outputs.version }}-macos-${ARCH}.dmg"
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"

          # The .p8 secret is stored base64-encoded to avoid newline mangling
          # in GitHub's secret editor. If you ever rotate the key, paste the
          # `base64 < AuthKey_XXXXXX.p8` output as the secret value.
          echo "$APPSTORE_API_KEY_P8" | base64 --decode > "$KEY_PATH"

          # notarytool submit blocks until accepted/invalid (~2-15 min). We
          # capture stdout to parse the submission ID, then drive the
          # accept/reject branch from --output-format json status field.
          # Don't use `set -e` around the submit itself — we want to fetch
          # the log on rejection before exiting.
          set +e
          SUBMIT_OUT=$(xcrun notarytool submit "$DMG_PATH" \
              --key "$KEY_PATH" \
              --key-id "$APPSTORE_KEY_ID" \
              --issuer "$APPSTORE_ISSUER_ID" \
              --wait \
              --output-format json)
          SUBMIT_RC=$?
          set -e
          echo "$SUBMIT_OUT"

          # Parse with python3 (preinstalled on macos-latest) rather than jq
          # to avoid an extra brew install.
          SUBMISSION_ID=$(echo "$SUBMIT_OUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || true)
          STATUS=$(echo "$SUBMIT_OUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || true)

          if [ "$STATUS" != "Accepted" ] || [ "$SUBMIT_RC" -ne 0 ]; then
              echo "::error::Notarization failed (status=$STATUS, rc=$SUBMIT_RC, id=$SUBMISSION_ID)"
              if [ -n "$SUBMISSION_ID" ]; then
                  echo "::group::notarytool log $SUBMISSION_ID"
                  xcrun notarytool log "$SUBMISSION_ID" \
                      --key "$KEY_PATH" \
                      --key-id "$APPSTORE_KEY_ID" \
                      --issuer "$APPSTORE_ISSUER_ID" || true
                  echo "::endgroup::"
              else
                  echo "::error::No submission ID returned — submit failed before Apple accepted it. Check network / quota / cert validity."
              fi
              rm -P "$KEY_PATH" 2>/dev/null || rm -f "$KEY_PATH"
              exit 1
          fi

          rm -P "$KEY_PATH" 2>/dev/null || rm -f "$KEY_PATH"
          echo "Notarization accepted (id=$SUBMISSION_ID)"

      - name: macOS — staple notarization ticket
        if: ${{ startsWith(matrix.config.os, 'macos') && (needs.determine-version.outputs.is-release == 'true' || needs.determine-version.outputs.is-nightly == 'true') }}
        run: |
          set -euo pipefail
          ARCH="${{ matrix.config.rid == 'osx-arm64' && 'arm64' || 'x64' }}"
          DMG_PATH="installers/output/OpenhpsdrZeus-${{ steps.version.outputs.version }}-macos-${ARCH}.dmg"
          # Stapling embeds the ticket into the DMG so first launch works
          # offline. Without staple, Gatekeeper has to call out to Apple to
          # verify notarization on every first launch — which fails for
          # users behind firewalls / on planes.
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: macOS — Gatekeeper assess
        if: ${{ startsWith(matrix.config.os, 'macos') && (needs.determine-version.outputs.is-release == 'true' || needs.determine-version.outputs.is-nightly == 'true') }}
        run: |
          set -euo pipefail
          ARCH="${{ matrix.config.rid == 'osx-arm64' && 'arm64' || 'x64' }}"
          DMG_PATH="installers/output/OpenhpsdrZeus-${{ steps.version.outputs.version }}-macos-${ARCH}.dmg"
          # `--type open` is the context Gatekeeper uses when the user
          # double-clicks the DMG to mount it. Primary-signature context
          # forces it to read the DMG's own signature, not anything cached.
          # Any rejection here (e.g. stale notarization, wrong identity)
          # would fail before users see a broken download.
          spctl --assess --type open --context context:primary-signature --verbose=2 "$DMG_PATH"

      - name: Upload macOS Package
        if: startsWith(matrix.config.os, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.artifact }}
          path: installers/output/OpenhpsdrZeus-${{ steps.version.outputs.version }}-macos-*.dmg
          if-no-files-found: error

      # Defensive cleanup — the macos-latest runner is ephemeral and gets
      # torn down after the job, but explicit removal of the temp keychain
      # + any leftover .p8/.p12 means a `if: always()` run on a future
      # runner image that caches $RUNNER_TEMP between jobs won't leak.
      - name: macOS — clean up signing material
        if: ${{ always() && startsWith(matrix.config.os, 'macos') && (needs.determine-version.outputs.is-release == 'true' || needs.determine-version.outputs.is-nightly == 'true') }}
        run: |
          set +e
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
              security delete-keychain "$KEYCHAIN_PATH"
          fi
          rm -P "$RUNNER_TEMP/macos-cert.p12"        2>/dev/null || rm -f "$RUNNER_TEMP/macos-cert.p12"
          rm -P "$RUNNER_TEMP/AuthKey.p8"            2>/dev/null || rm -f "$RUNNER_TEMP/AuthKey.p8"
          rm -P "$RUNNER_TEMP/DeveloperIDG2CA.cer"   2>/dev/null || rm -f "$RUNNER_TEMP/DeveloperIDG2CA.cer"
          # Restore the default user keychain search list to login only.
          security list-keychains -d user -s login.keychain-db || true
          true

  create-release:
    name: Create GitHub Release
    needs: [determine-version, build-release]
    if: needs.determine-version.outputs.is-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Determine version
        id: version
        run: |
          VERSION="${{ needs.determine-version.outputs.version }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Display artifact structure
        run: ls -R release-artifacts

      - name: Create Release Notes
        run: |
          cat > release-notes.md << 'EOF'
          # Openhpsdr Zeus v${{ steps.version.outputs.version }}

          Cross-platform SDR client for OpenHPSDR Protocol-1 and Protocol-2 radios.

          One binary, three launch modes:

          - **Headless service** (no flag, default) — LAN-bound HTTP/HTTPS server on
            port 6060/6443. Console banner only, no GUI. Use this for systemd, Docker,
            Raspberry Pi, or any headless deploy.
          - **Server mode** (`--server` flag) — same backend as headless, plus a
            small Photino status window showing the LAN URLs and a Stop Zeus button.
            What the new **Zeus Server** desktop icon launches on Windows / macOS /
            Linux.
          - **Desktop mode** (`--desktop` flag) — full Photino native window with the
            web UI inline. Loopback only, no browser tab. Use this for single-machine
            local operation.

          ## Downloads

          ### Windows (x64 / ARM64)
          - **openhpsdr-zeus-${{ steps.version.outputs.version }}-win-x64-setup.exe**
          - **openhpsdr-zeus-${{ steps.version.outputs.version }}-win-arm64-setup.exe**

          The installer drops two Start Menu shortcuts plus optional desktop
          icons: **Openhpsdr Zeus** (Photino native window, `--desktop`) and
          **Openhpsdr Zeus Server** (backend + small status window with the LAN
          URLs and a Stop Zeus button, `--server`). The desktop-icon checkboxes
          appear on the installer's "Additional Tasks" page — pick whichever
          icons you want on the desktop. ARM64 build is native for Surface Pro X
          / Snapdragon X Elite hosts. .NET 10 runtime is bundled — no separate
          install required.

          Upgrade behaviour: this installer reuses the same AppId as the previous
          service-mode installer, so it upgrades that install in place. If you
          previously installed the separate "Zeus Desktop" edition it remains
          alongside this install as cruft until you uninstall it manually from
          Settings → Apps.

          ### macOS (Apple Silicon)
          - **OpenhpsdrZeus-${{ steps.version.outputs.version }}-macos-arm64.dmg**

          Drag **both** `OpenHPSDR Zeus.app` and `OpenHPSDR Zeus Server.app` to Applications.
          Double-clicking `OpenHPSDR Zeus.app` opens the Photino desktop window;
          double-clicking `OpenHPSDR Zeus Server.app` runs the backend with a small
          status window showing the LAN URLs and a Stop Zeus button.
          `OpenHPSDR Zeus Server.app` is a thin wrapper — drag both, or drag just
          `OpenHPSDR Zeus.app` if you only want the desktop window.

          Intel Mac builds are no longer published — the `macos-13` runner queue
          on GitHub-hosted Actions is too slow to be practical. Build from source
          if you need one.

          The DMG and both `.app` bundles are signed with a Developer ID
          Application certificate and notarized by Apple, so Gatekeeper
          accepts them directly — no `xattr -cr` workaround needed.

          ### Linux (x64)
          - **openhpsdr-zeus-${{ steps.version.outputs.version }}-linux-x64.tar.gz**
            — extract; run `./install-icons.sh` to register Zeus + Zeus Server
            in the application menu, or invoke any of the three launchers
            directly: `./openhpsdr-zeus` (headless service), `./openhpsdr-zeus-desktop`
            (Photino window), `./openhpsdr-zeus-server` (backend + status window).
            Self-contained .NET runtime + statically-embedded FFTW3.
          - **OpenhpsdrZeus-${{ steps.version.outputs.version }}-linux-x86_64.AppImage**
            — single-file Photino desktop launcher: `chmod +x` and run.
          - **OpenhpsdrZeus-Server-${{ steps.version.outputs.version }}-linux-x86_64.AppImage**
            — single-file server launcher: backend + status window with the
            LAN URLs and a Stop Zeus button.
          - Both AppImages require `libwebkit2gtk-4.1-0` (`apt install` / `dnf install`).

          ## Changes

          See the [full changelog](https://github.com/Kb2uka/openhpsdr-zeus/compare/...v${{ steps.version.outputs.version }}) for details.

          ## License

          GNU GPL v2 or later. See [LICENSE](https://github.com/Kb2uka/openhpsdr-zeus/blob/main/LICENSE) for details.
          EOF

      - name: Create or Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Openhpsdr Zeus v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          # Draft mode is set by determine-version when triggered via
          # workflow_dispatch with draft=true. Tag-push releases publish
          # immediately (is-draft="false" in that path).
          draft: ${{ needs.determine-version.outputs.is-draft == 'true' }}
          prerelease: false
          files: |
            release-artifacts/windows-installer/*
            release-artifacts/windows-arm64-installer/*
            release-artifacts/linux-tarball/*
            release-artifacts/linux-appimage/*
            release-artifacts/macos-arm64-dmg/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------- Nightly rolling prerelease ----------------------------------
  #
  # Only fires when determine-version set is-nightly=true, i.e. the workflow
  # was invoked via workflow_call with mode=nightly (see nightly.yml). Force-
  # recreates a single GitHub Release at tag `nightly` so end users have a
  # stable URL pointing at the latest develop tip.
  create-nightly-release:
    name: Publish nightly prerelease
    needs: [determine-version, build-release]
    if: needs.determine-version.outputs.is-nightly == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          VERSION="${{ needs.determine-version.outputs.version }}"
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          DATE_STAMP=$(date -u +%Y-%m-%d)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short-sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE_STAMP}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Display artifact structure
        run: ls -R release-artifacts

      - name: Build commit list since last tagged release
        id: commits
        run: |
          # Find the most recent v*.*.* tag reachable from HEAD; fall back to
          # "no previous tag" if the repo has never been tagged (unlikely but
          # cheap to guard).
          LAST_TAG=$(git describe --tags --abbrev=0 --match='v*.*.*' 2>/dev/null || echo "")
          if [[ -n "$LAST_TAG" ]]; then
            echo "Last tag: $LAST_TAG"
            git log --pretty=format:'- %s (%h)' "${LAST_TAG}..HEAD" > commits.txt
          else
            echo "No previous v*.*.* tag found; listing last 50 commits"
            git log --pretty=format:'- %s (%h)' -n 50 > commits.txt
          fi
          echo "last-tag=${LAST_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create nightly release notes
        run: |
          cat > nightly-notes.md << EOF
          # Openhpsdr Zeus nightly build

          **Built from \`develop\` at commit \`${{ steps.version.outputs.short-sha }}\` on ${{ steps.version.outputs.date }} (UTC).**
          **Version string:** \`${{ steps.version.outputs.version }}\`

          > ⚠️  This is a **development build**, not a release. It rolls forward
          > nightly and is not signed, tested, or supported in the same way as
          > tagged releases. Use it to try the latest changes; do not rely on it
          > for production operation. Uninstall before installing a tagged
          > release.

          Same one-binary, three-launch-modes layout as a tagged release —
          see the project README for headless / server / desktop semantics.

          ## Downloads

          - **openhpsdr-zeus-${{ steps.version.outputs.version }}-win-x64-setup.exe** — Windows x64 installer
          - **openhpsdr-zeus-${{ steps.version.outputs.version }}-win-arm64-setup.exe** — Windows ARM64 installer
          - **openhpsdr-zeus-${{ steps.version.outputs.version }}-linux-x64.tar.gz** — Linux x64 tarball
          - **OpenhpsdrZeus-${{ steps.version.outputs.version }}-linux-x86_64.AppImage** — Linux desktop AppImage
          - **OpenhpsdrZeus-Server-${{ steps.version.outputs.version }}-linux-x86_64.AppImage** — Linux server AppImage
          - **OpenhpsdrZeus-${{ steps.version.outputs.version }}-macos-arm64.dmg** — macOS Apple Silicon DMG

          The macOS DMG is signed and notarized — no \`xattr -cr\` workaround
          needed even on nightlies. Linux AppImage dependencies are listed
          in the latest tagged release notes.

          ## Changes since ${{ steps.commits.outputs.last-tag }}
          EOF
          if [[ -s commits.txt ]]; then
            cat commits.txt >> nightly-notes.md
          else
            echo "_(no changes since last tag)_" >> nightly-notes.md
          fi
          echo "" >> nightly-notes.md
          echo "" >> nightly-notes.md
          echo "Source: <https://github.com/${{ github.repository }}/commit/${{ steps.version.outputs.short-sha }}>" >> nightly-notes.md

      - name: Publish nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Force-recreate the rolling `nightly` release/tag so the rolling
          # pointer moves to the new build SHA and old assets disappear.
          #
          # We deliberately do NOT use softprops/action-gh-release@v1 with
          # `target_commitish: <sha>` here: that path 422s when the tag
          # doesn't already exist (GitHub: "tag_name is not a valid tag").
          # Instead we pre-create the tag via the Git refs API and then
          # attach the release to the now-existing tag via `gh release
          # create`, which is robust on both first and subsequent runs.
          SHORT_SHA="${{ steps.version.outputs.short-sha }}"
          # The Git refs API rejects abbreviated SHAs with HTTP 422
          # ("At least 40 characters are required; only 7 were supplied").
          # Same checkout as the version step above, so HEAD is the same
          # commit — resolve the full 40-char SHA here for the API calls.
          FULL_SHA=$(git rev-parse HEAD)
          REPO="${{ github.repository }}"

          # Drop the previous release if any (keep the tag — we'll move it
          # next). `|| true` because the first nightly has nothing to delete.
          gh release delete nightly --yes --repo "$REPO" || true

          # Force-create or move refs/tags/nightly to the build SHA via the
          # Git refs API, independent of local checkout state.
          if gh api "repos/$REPO/git/refs/tags/nightly" >/dev/null 2>&1; then
            gh api "repos/$REPO/git/refs/tags/nightly" \
              -X PATCH -F sha="$FULL_SHA" -F force=true >/dev/null
          else
            gh api "repos/$REPO/git/refs" \
              -X POST -f ref="refs/tags/nightly" -f sha="$FULL_SHA" >/dev/null
          fi

          # Create the prerelease against the freshly pointed tag.
          gh release create nightly \
            --prerelease \
            --title "Openhpsdr Zeus nightly — ${{ steps.version.outputs.date }} ($SHORT_SHA)" \
            --notes-file nightly-notes.md \
            --repo "$REPO" \
            release-artifacts/windows-installer/* \
            release-artifacts/windows-arm64-installer/* \
            release-artifacts/linux-tarball/* \
            release-artifacts/linux-appimage/* \
            release-artifacts/macos-arm64-dmg/*
